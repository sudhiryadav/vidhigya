# Deploy uses standard CI/CD variables for SSH + target, and File variables for app env:
#
#   Scalar (Type = Variable):
#     PROD_SERVER_IP, PROD_SSH_USER
#     PROD_SSH_PRIVATE_KEY — base64-encoded private key, one line (parent groups often use this name)
#     PROD_SSH_PRIVATE_KEY_B64 — optional alias; used if PROD_SSH_PRIVATE_KEY is unset
#     PROD_REPO_DIR (optional, default /home/ubuntu/prod/vidhigya)
#
#   If group variables do not appear: ensure branch is Protected when vars are Protected;
#   set Environment scope to * OR scope to production — this job uses environment: production.
#
#   File (Type = File):
#     WEB_ENV_FILE, BACKEND_ENV_FILE, AI_ENV_FILE
#
# See ci-cd/gitlab-file-variables.example

variables:
  RUN_PIPELINE: "false"
  FORCE_FRONTEND: "false"
  FORCE_BACKEND: "false"

stages:
  - check_changes
  - deploy_production

check_changes:
  stage: check_changes
  image: alpine:latest
  script:
    - apk add --no-cache git
    - touch changes.env
    - |
      echo "FRONTEND_CHANGED=$(git diff --name-only ${CI_COMMIT_BEFORE_SHA} ${CI_COMMIT_SHA} | grep -qE '^apps/web/|^packages/' && echo true || echo false)" >> changes.env
      echo "BACKEND_CHANGED=$(git diff --name-only ${CI_COMMIT_BEFORE_SHA} ${CI_COMMIT_SHA} | grep -qE '^apps/backend/|^packages/' && echo true || echo false)" >> changes.env
    - cat changes.env
  artifacts:
    reports:
      dotenv: changes.env
  rules:
    - if: '$RUN_PIPELINE == "true"'
    - if: '$CI_COMMIT_BRANCH == "prod"'

.deploy_base:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git rsync
    - |
      set -e
      SSH_KEY_B64="${PROD_SSH_PRIVATE_KEY_B64:-${PROD_SSH_PRIVATE_KEY:-}}"
      if [ -z "${PROD_SERVER_IP:-}" ] || [ -z "${PROD_SSH_USER:-}" ] || [ -z "$SSH_KEY_B64" ]; then
        echo "Missing CI/CD variables: PROD_SERVER_IP, PROD_SSH_USER, and PROD_SSH_PRIVATE_KEY (or PROD_SSH_PRIVATE_KEY_B64)."
        echo "If they exist on a parent group: mark prod branch Protected (when vars are Protected),"
        echo "or set variable Environment scope to * or production (this deploy job uses environment: production)."
        exit 1
      fi
      if [ -z "${PROD_REPO_DIR:-}" ]; then export PROD_REPO_DIR="/home/ubuntu/prod/vidhigya"; fi
      export SSH_USER="$PROD_SSH_USER"
      export SERVER_IP="$PROD_SERVER_IP"
      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      echo "$SSH_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa

deploy_production:
  stage: deploy_production
  needs: [check_changes]
  environment:
    name: production
    url: https://vidhigya.qurieus.com
  extends: .deploy_base
  script:
    - |
      if [ -z "${WEB_ENV_FILE:-}" ] || [ ! -f "$WEB_ENV_FILE" ]; then
        echo "Missing GitLab CI/CD File variable WEB_ENV_FILE (apps/web/.env)."
        exit 1
      fi
      if [ -z "${BACKEND_ENV_FILE:-}" ] || [ ! -f "$BACKEND_ENV_FILE" ]; then
        echo "Missing GitLab CI/CD File variable BACKEND_ENV_FILE (apps/backend/.env)."
        exit 1
      fi
      if [ -z "${AI_ENV_FILE:-}" ] || [ ! -f "$AI_ENV_FILE" ]; then
        echo "Missing GitLab CI/CD File variable AI_ENV_FILE (apps/ai-service/.env)."
        exit 1
      fi

      REPO_DIR="$PROD_REPO_DIR"
      BRANCH="prod"
      F=$([ "$FRONTEND_CHANGED" = "true" ] || [ "$FORCE_FRONTEND" = "true" ] && echo true || echo false)
      B=$([ "$BACKEND_CHANGED" = "true" ] || [ "$FORCE_BACKEND" = "true" ] && echo true || echo false)
      git clone --depth 50 --branch "$BRANCH" "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/frontslash/apps/vidhigya.git" /tmp/vidhigya-deploy
      echo "Deploy target: ${SSH_USER}@${SERVER_IP}:${REPO_DIR}"
      ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SERVER_IP}" "mkdir -p '${REPO_DIR}' && test -d '${REPO_DIR}' && echo 'Remote dir ready: ${REPO_DIR}'"
      set +e
      rsync -avz --delete --exclude=node_modules --exclude=.next --exclude=dist --exclude='*.env' --exclude='.git' --exclude='.cursor' --exclude='.vscode' --rsync-path="mkdir -p ${REPO_DIR} && rsync" -e "ssh -o StrictHostKeyChecking=no" /tmp/vidhigya-deploy/ "${SSH_USER}@${SERVER_IP}:${REPO_DIR}/"
      RSYNC_EXIT=$?
      set -e
      if [ "$RSYNC_EXIT" -ne 0 ]; then
        echo "Primary rsync failed with exit code ${RSYNC_EXIT}. Retrying with no owner/group/perms/times..."
        set +e
        rsync -rvz --delete --no-owner --no-group --no-perms --omit-dir-times --exclude=node_modules --exclude=.next --exclude=dist --exclude='*.env' --exclude='.git' --exclude='.cursor' --exclude='.vscode' --rsync-path="mkdir -p ${REPO_DIR} && rsync" -e "ssh -o StrictHostKeyChecking=no" /tmp/vidhigya-deploy/ "${SSH_USER}@${SERVER_IP}:${REPO_DIR}/"
        RSYNC_EXIT=$?
        set -e
      fi
      if [ "$RSYNC_EXIT" -ne 0 ]; then
        echo "rsync failed after retry with exit code ${RSYNC_EXIT}"
        exit "$RSYNC_EXIT"
      fi
      ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SERVER_IP}" "mkdir -p '${REPO_DIR}/apps/web' '${REPO_DIR}/apps/backend' '${REPO_DIR}/apps/ai-service'"
      scp -o StrictHostKeyChecking=no "$WEB_ENV_FILE" "${SSH_USER}@${SERVER_IP}:${REPO_DIR}/apps/web/.env"
      scp -o StrictHostKeyChecking=no "$BACKEND_ENV_FILE" "${SSH_USER}@${SERVER_IP}:${REPO_DIR}/apps/backend/.env"
      scp -o StrictHostKeyChecking=no "$AI_ENV_FILE" "${SSH_USER}@${SERVER_IP}:${REPO_DIR}/apps/ai-service/.env"
      echo "Uploaded .env for web, backend, and ai-service from CI File variables"
      ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SERVER_IP}" "rm -f /home/ubuntu/prod.vidhigya.web.env /home/ubuntu/prod.vidhigya.backend.env /home/ubuntu/prod.vidhigya.ai-service.env || true"
      ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SERVER_IP}" \
        "export REPO_DIR='${REPO_DIR}' SKIP_GIT_PULL=1 && cd \"\$REPO_DIR\" && bash ci-cd/scripts/deploy-from-source.sh prod prod $F $B"
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'
    - if: '$RUN_PIPELINE == "true"'
