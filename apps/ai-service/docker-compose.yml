services:
  backend:
    # The image will be specified by a variable in the CI/CD pipeline.
    # A default is provided for local testing.
    image: ${BACKEND_IMAGE:-${DOCKERHUB_USERNAME}/qurieus-backend:latest}
    platform: linux/arm64
    container_name: qurieus-backend
    restart: always
    ports:
      - "8001:8001"
    # Environment variables from .env file
    env_file:
      - .env
    # Health check to ensure the application is running
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 